services:
    immich-server:
        image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
        container_name: immich-server
        restart: unless-stopped
        labels:
            - homepage.group=Home Server
            - homepage.weight=80
            - homepage.name=Immich
            - homepage.icon=immich
            - homepage.href=https://immich.{{HOMEPAGE_VAR_DOMAIN}}
            - homepage.description=Photo & Video Backup
            - homepage.siteMonitor=http://immich-server:2283
            - homepage.widget.type=immich
            - homepage.widget.url=http://immich-server:2283
            - homepage.widget.key={{HOMEPAGE_VAR_IMMICH_API_KEY}}
            - homepage.widget.version=2
        env_file: .env
        volumes:
            - ${DATA_DIR}/immich/library:/usr/src/app/upload
            - /etc/localtime:/etc/localtime:ro
        depends_on:
            - immich-redis
            - immich-postgres
        networks:
            - home-server
            - immich-internal

    immich-machine-learning:
        image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
        container_name: immich-machine-learning
        restart: unless-stopped
        volumes:
            - ${DATA_DIR}/immich/model-cache:/cache
        networks:
            - immich-internal

    immich-redis:
        image: redis:7.2-alpine
        container_name: immich-redis
        restart: unless-stopped
        networks:
            - immich-internal

    immich-postgres:
        image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
        container_name: immich-postgres
        restart: unless-stopped
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_DB: ${DB_DATABASE_NAME}
            POSTGRES_INITDB_ARGS: '--data-checksums'
        volumes:
            - ${DATA_DIR}/immich/postgres:/var/lib/postgresql/data
        networks:
            - immich-internal

networks:
    home-server:
        external: true
    immich-internal:
        driver: bridge
