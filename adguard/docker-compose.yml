services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    labels:
      - homepage.group=Home Server
      - homepage.weight=40
      - homepage.name=AdGuard
      - homepage.icon=sh-adguard-home
      - homepage.href=https://adguard.{{HOMEPAGE_VAR_DOMAIN}}
      - homepage.description=Local DNS Server
      - homepage.siteMonitor=http://adguardhome:3000
    ports:
      # DNS ports
      - "53:53/tcp"
      - "53:53/udp"
      # Web interface
      - "3000:3000/tcp"
      # AdGuard Home specific ports
      - "853:853/tcp"
      - "853:853/udp"
      - "5443:5443/tcp"
      - "5443:5443/udp"
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
    networks:
      - home-server

networks:
  home-server:
    external: true
